function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function gwk(off=0){const d=new Date(PROGRAM_START);d.setDate(d.getDate()+off*7);return d;}
function gdd(ws,i){const d=new Date(ws);d.setDate(ws.getDate()+i);return d;}
function fmt(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function emptyDay(dn){return{acts:Object.fromEntries(SCHEDULE[dn].acts.map(a=>[a,false])),breakfast:null,lunch:null,dinner:null,snack:null,water:0,custom:[]};}
function sGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}}
function getMacros(n){if(!n)return{cals:0,p:0,c:0,f:0};return ALL_MEALS.find(m=>m.name===n)||{cals:0,p:0,c:0,f:0};}

  async function searchFoodDB(query){
    if(!query||query.length<2){setDbResults([]);return;}
    setDbLoading(true);
    try{
      const offUrl="https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(query)+"&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,brands";
      const res=await fetch("https://corsproxy.io/?"+encodeURIComponent(offUrl));
      const data=await res.json();
      if(data.products&&data.products.length>0){
        const results=data.products
          .filter(p=>p.product_name)
          .map(p=>({
            name:(p.product_name+(p.brands?" ("+p.brands.split(",")[0]+")":"")).slice(0,50),
            cals:Math.round(p.nutriments["energy-kcal_serving"]||p.nutriments["energy-kcal_100g"]||0),
            p:Math.round(p.nutriments["proteins_serving"]||p.nutriments["proteins_100g"]||0),
            c:Math.round(p.nutriments["carbohydrates_serving"]||p.nutriments["carbohydrates_100g"]||0),
            f:Math.round(p.nutriments["fat_serving"]||p.nutriments["fat_100g"]||0),
            cat:"Open Food Facts"
          }))
          .filter(p=>p.cals>0);
        setDbResults(results.slice(0,8));
      }else{setDbResults([]);}
    }catch(e){setDbResults([]);}
    setDbLoading(false);
  }

  async function lookupBarcode(code){
    if(!code)return;
    setBLoading(true);setBStatus("Looking up "+code+"...");
    // Check local DB first for instant response
    const local=BARCODE_DB[code.trim()];
    if(local){
      setCName(local.name);setCCals(String(local.cals));setCP(String(local.p));setCC(String(local.c));setCF(String(local.f));
      setBInput("");setBStatus("Found: "+local.name+" — tap Add Food");
      setBLoading(false);return;
    }
    // Fall back to Open Food Facts API
    try{
      const bUrl="https://world.openfoodfacts.org/api/v0/product/"+code.trim()+".json";
      const res=await fetch("https://corsproxy.io/?"+encodeURIComponent(bUrl));
      const data=await res.json();
      if(data.status===1&&data.product){
        const p=data.product;const n=p.nutriments||{};
        const name=(p.product_name||p.abbreviated_product_name||("UPC "+code)).slice(0,60);
        const cals=Math.round(n["energy-kcal_serving"]||n["energy-kcal_100g"]||0);
        const protein=Math.round(n["proteins_serving"]||n["proteins_100g"]||0);
        const carbs=Math.round(n["carbohydrates_serving"]||n["carbohydrates_100g"]||0);
        const fat=Math.round(n["fat_serving"]||n["fat_100g"]||0);
        setCName(name);setCCals(String(cals));setCP(String(protein));setCC(String(carbs));setCF(String(fat));
        setBInput("");setBStatus("Found: "+name+" — review and tap Add Food");
      }else{
        setBStatus("Not found in database. Try name search or enter manually.");
      }
    }catch(e){
      setBStatus("Lookup failed. Try name search or enter manually.");
    }
    setBLoading(false);
  }

  async function sendCoach(q){
    const msg=(q||coachInput).trim();if(!msg)return;
    if(!apiKey){
      setCoachMsgs([...coachMsgs,{role:"user",content:msg},{role:"assistant",content:"Please add your Anthropic API key above to activate the coach. Get one free at console.anthropic.com → API Keys → Create Key."}]);

    }
    // Morning check-in
    if(msg.includes("Morning Check-In")||msg.toLowerCase().includes("morning check")||msg.toLowerCase()==="good morning"){

      const daySchedule=SCHEDULE[dayName];

      const isSwim=daySchedule.acts.some(a=>a.includes("Swim"));
      const workoutType=isLift?"lifting day — bike warm-up first, then all 10 machines":isSwim?"swim day — 45 minutes, intervals":dayName==="Sunday"?"rest day — walk, bike, and Essentrics only":"active day";
      const bfNames={"Monday":"High Protein Scramble","Tuesday":"Greek Yogurt Power Bowl","Wednesday":"Cottage Cheese Pancakes","Thursday":"High Protein Scramble","Friday":"Greek Yogurt Power Bowl","Saturday":"Cottage Cheese Pancakes","Sunday":"Southwest Egg Burrito"};
      const lunchNames={"Monday":"Tuna Power Salad","Tuesday":"Chicken Quinoa Bowl","Wednesday":"Tuna Power Salad","Thursday":"Chicken Quinoa Bowl","Friday":"Tuna Power Salad","Saturday":"Chicken Quinoa Bowl","Sunday":"Turkey White Bean Soup"};
      const dinnerNames={"Monday":"Sheet Pan Salmon & Asparagus","Tuesday":"Turkey Taco Bowl","Wednesday":"Baked Chicken Parmesan","Thursday":"Garlic Shrimp & Cauliflower Rice","Friday":"Mahi Mahi Fish Tacos","Saturday":"Smash Burger Night","Sunday":"Turkey Stuffed Bell Peppers"};
      const morningMsg="Good morning Greg. Today is "+dayName+". "+(lat?"You are at "+lat+" lbs — down "+lost+" lbs from 280. ":"Log your weight first thing. ")+"Here is your day: Breakfast is "+bfNames[dayName]+". Today is a "+workoutType+". Lunch: "+lunchNames[dayName]+". Snack: protein shake at 3 PM. Dinner: "+dinnerNames[dayName]+". Evening bike at 7 PM, Essentrics at 7:25 PM, AA meeting after. Gratitude prayer at 9 PM, in bed by 9:30. Say your morning prayer, drink your water, and go. One day at a time Greg. Let's go.";
      setCoachMsgs([...coachMsgs,{role:"user",content:msg},{role:"assistant",content:morningMsg}]);
      setCoachInput("");
      return;
    }
    // Evening check-in
    if(msg.includes("Evening Check-In")||msg.toLowerCase().includes("evening check")||msg.toLowerCase().includes("good night")){
      const pct=acts.length>0?Math.round(actsDone/acts.length*100):0;
      const waterDone=dd.water>=WATER_GOAL;
      const score=[pct>=80,mealsDone>=3,deficit>=800,waterDone].filter(Boolean).length;
      const grade=score===4?"Perfect execution today Greg. Every box checked. This is exactly how May 5th gets built — one flawless day at a time.":score===3?"Strong day Greg. Three out of four pillars solid. Identify the one gap and close it tomorrow.":score===2?"Decent effort but the plan demands more. Review what slipped today and recommit tonight before you sleep.":"Today was a reset day Greg. That is okay — one day does not break a 35-day plan. But tomorrow has to be different. Say your gratitude prayer, get to bed, and start clean at 5:45 AM.";
      const eveningMsg=grade+" Here is your scorecard: Activities "+actsDone+"/"+acts.length+" ("+pct+"%). Meals logged: "+mealsDone+"/4. Calorie deficit today: "+deficit+" cal. Water: "+(dd.water*8)+"/130oz. This week total deficit: "+wkTot.deficit+" cal — that is "+(wkTot.deficit/3500).toFixed(1)+" lbs of fat. "+(deficit>0?"Good deficit today. ":"Log your meals if you haven't — the tracker needs that data. ")+"Say your gratitude prayer. Name three specific things from today. Then get to sleep — 9:30 PM lights out. You need those 8 hours. See you at 5:45 AM.";
      setCoachMsgs([...coachMsgs,{role:"user",content:msg},{role:"assistant",content:eveningMsg}]);
      setCoachInput("");
      return;
    }
    const lat=wLog.length>0?wLog[wLog.length-1].weight:null;
    const lost=lat?(280-lat).toFixed(1):0;
    const avgDef=wkTot.deficit>0?wkTot.deficit/7:1000;
    const rem=lat?lat-175:105;
    const wksLeft=Math.round(rem*3500/avgDef/7);
    const sys="You are a warm, direct, knowledgeable personal coach for Greg. Here is everything about him: He is 5ft 10in, started at 280 lbs, currently "+(lat||280)+" lbs, lost "+lost+" lbs so far, goal is 175 lbs. He has occasional left knee and right foot inflammation. He is in AA recovery — acknowledge that strength when relevant. Today is "+dayName+". Activities completed: "+actsDone+"/"+acts.length+". Calories eaten: "+tCals+". Exercise burned: "+burned+" cal. Calorie deficit today: "+deficit+" cal. Water: "+(dd.water*8)+"/104oz. This week deficit: "+wkTot.deficit+" cal (~"+(wkTot.deficit/3500).toFixed(1)+" lbs). Estimated weeks to goal at current pace: "+wksLeft+". His plan: walk 1 mile daily, stationary bike 20 min daily, Essentrics nightly, meditation daily, AA meeting daily, call sponsor daily. Lift Mon/Wed/Fri, swim Tue/Thu/Sat. Target 1,800 cal/day, 180g protein. Keep responses warm, direct, 2-3 short paragraphs. Use his name occasionally.";
    const newMsgs=[...coachMsgs,{role:"user",content:msg}];
    setCoachMsgs(newMsgs);setCoachInput("");setCoachLoading(true);
    setTimeout(()=>chatEnd.current&&chatEnd.current.scrollIntoView({behavior:"smooth"}),100);
    try{
      // Use a serverless function approach via a public CORS-enabled endpoint
      const payload={model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:newMsgs.map(m=>({role:m.role,content:m.content}))};
      // Try multiple CORS proxies in sequence
      const proxies=[
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://cors-anywhere.herokuapp.com/"
      ];
      let lastError="";
      let replied=false;
      for(const proxy of proxies){
        try{
          const url=proxy==="https://cors-anywhere.herokuapp.com/"
            ?proxy+"https://api.anthropic.com/v1/messages"
            :proxy+encodeURIComponent("https://api.anthropic.com/v1/messages");
          const res=await fetch(url,{
            method:"POST",
            headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":apiKey,"anthropic-dangerous-direct-browser-access":"true"},
            body:JSON.stringify(payload)
          });
          const rawText=await res.text();
          let data;
          try{data=JSON.parse(rawText);}catch(e){lastError="Parse error: "+rawText.slice(0,100);continue;}
          if(!res.ok||data.error){lastError="API error: "+(data&&data.error&&data.error.message?data.error.message:res.status);continue;}
          const reply=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:"No response — please try again.";
          setCoachMsgs([...newMsgs,{role:"assistant",content:reply}]);
          replied=true;break;
        }catch(e){lastError=e.message;continue;}
      }
      if(!replied){setCoachMsgs([...newMsgs,{role:"assistant",content:"Could not connect to coach. Error: "+lastError+". Please check your internet connection and try again."}]);}
    }catch(e){
      setCoachMsgs([...newMsgs,{role:"assistant",content:"Error: "+e.name+" — "+e.message}]);
    }
    setCoachLoading(false);
    setTimeout(()=>chatEnd.current&&chatEnd.current.scrollIntoView({behavior:"smooth"}),100);
  }

                {[["Eaten",wkTot.cals+" cal","#e8e0d0"],["Burned",wkTot.burned+" cal","#22c55e"],["Deficit",wkTot.deficit+" cal","#3b82f6"],["Est Lost",(wkTot.deficit/3500).toFixed(1)+" lbs",gold]].map(([l,v,c])=>(
                  <div key={l} style={{flex:"1 1 80px",background:"#0d1422",border:"1px solid "+border,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                    <div style={{...s.mono,fontSize:14,fontWeight:700,color:c,marginBottom:3}}>{v}</div>
                    <div style={{fontSize:9,color:"#7a8aaa",...s.mono,letterSpacing:1,textTransform:"uppercase"}}>{l}</div>
                  </div>
                ))}
              </div>
              <div style={{...s.mono,fontSize:10,color:"#7a8aaa",marginBottom:4}}>Weekly deficit vs 10,500 cal goal (3 lbs)</div>
              <div style={{height:10,borderRadius:5,background:border,overflow:"hidden"}}>
                <div style={{height:"100%",width:Math.min(100,Math.round(wkTot.deficit/10500*100))+"%",background:"linear-gradient(90deg,#3b82f6,"+gold+")",borderRadius:5,transition:"width .4s"}}/>
              </div>
            </div>
            {DAYS.map((dn,i)=>{
              const k=dk(gdd(ws,i));const d=days[k]||emptyDay(dn);
              const dActs=SCHEDULE[dn].acts;const dDone=dActs.filter(a=>d.acts?.[a]).length;
              const dB=dActs.filter(a=>d.acts?.[a]).reduce((s,a)=>s+(BURNS[a]||0),0);
              const db=getMacros(d.breakfast),dl=getMacros(d.lunch),dd2=getMacros(d.dinner),ds=getMacros(d.snack);
              const dc=(d.custom||[]).reduce((a,f)=>a+f.cals,0);
              const dC=db.cals+dl.cals+dd2.cals+ds.cals+dc;
              const dDef=Math.max(0,BMR+dB-dC);
              const pct=dActs.length>0?Math.round(dDone/dActs.length*100):0;
              return(
                <div key={dn} onClick={()=>{setSelDay(i);setTab("tracker");}} style={{...s.card,cursor:"pointer",borderColor:i===selDay?"#c8a96e55":border,marginBottom:8,transition:"border-color .2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div><span style={{fontWeight:700,fontSize:14}}>{dn}</span><span style={{...s.mono,fontSize:11,color:"#7a8aaa",marginLeft:8}}>{fmt(gdd(ws,i))}</span></div>
                    <div style={{fontSize:10,padding:"2px 8px",borderRadius:20,...s.mono,background:IC[SCHEDULE[dn].intensity]+"22",color:IC[SCHEDULE[dn].intensity],border:"1px solid "+IC[SCHEDULE[dn].intensity]+"44"}}>{SCHEDULE[dn].intensity}</div>
                  </div>
                  <div style={{marginBottom:6}}><Bar pct={pct} color={pct===100?"#22c55e":gold}/></div>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    {[["Acts",dDone+"/"+dActs.length,dDone===dActs.length],["Meals",[d.breakfast,d.lunch,d.dinner,d.snack].filter(Boolean).length+"/4",false],["Water",(d.water*8)+"/104oz",d.water>=WATER_GOAL],["Deficit",dDef+" cal",dDef>800]].map(([l,v,g])=>(
                      <div key={l} style={{...s.mono,fontSize:11,color:g?"#22c55e":"#7a8aaa"}}>{l}: {v}</div>
                    ))}
                  </div>
                </div>
              );
            })}
            <div style={{...s.card,borderColor:"#c8a96e33"}}>
              <div style={{...s.label,marginBottom:10}}>Weekly Totals</div>
              {[["Workouts",wkTot.actsDone+"/"+wkTot.actsTotal],["Compliance",wkTot.actsTotal>0?Math.round(wkTot.actsDone/wkTot.actsTotal*100)+"%":"0%"],["Meals logged",wkTot.meals+"/28"],["Calories eaten",wkTot.cals+" cal"],["Calories burned",wkTot.burned+" cal"],["Total deficit",wkTot.deficit+" cal"],["Est fat lost",(wkTot.deficit/3500).toFixed(2)+" lbs"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #1e2a4040",fontSize:13}}>
                  <span style={{color:"#7a8aaa"}}>{k}</span><span style={{...s.mono}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ══ WEIGHT ══ */}
        {tab==="weight"&&(
          <div style={{paddingTop:14}}>
            <h2 style={{...s.playfair,fontSize:22,marginBottom:4}}>Weight <span style={{color:gold}}>Log</span></h2>
            <p style={{color:"#7a8aaa",fontSize:12,...s.mono,marginBottom:16}}>Start: 280 lbs · Goal: 175 lbs</p>
            <div style={{...s.card,borderColor:"#c8a96e33",marginBottom:12}}>
              <div style={{...s.label,marginBottom:12}}>Log Today's Weight</div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <input type="number" value={wInput} onChange={e=>setWInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&logWeight()} placeholder="280.0" style={{background:"#0d1422",border:"1px solid #2a3050",color:"#e8e0d0",padding:"10px",borderRadius:8,...s.mono,fontSize:18,outline:"none",width:130,textAlign:"center"}}/>
                <span style={{color:"#7a8aaa",...s.mono,fontSize:13}}>lbs</span>
                <button onClick={logWeight} style={{background:gold,border:"none",color:dark,padding:"10px 18px",borderRadius:8,...s.mono,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Log It</button>
              </div>
            </div>
            {wLog.length>0&&(()=>{
              const lat=wLog[wLog.length-1].weight;const lost=280-lat;const rem=lat-175;
              const pct=Math.min(100,Math.round(lost/105*100));
              return(
                <div style={{...s.card,marginBottom:12}}>
                  <div style={{...s.label,marginBottom:12}}>Progress</div>
                  <div style={{display:"flex",marginBottom:14}}>
                    {[["Current",lat+" lbs","#e8e0d0"],["Lost",(lost>0?"-":"")+Math.abs(lost).toFixed(1)+" lbs",lost>0?"#22c55e":"#ef4444"],["To Goal",rem.toFixed(1)+" lbs",gold]].map(([l,v,c])=>(
                      <div key={l} style={{flex:1,textAlign:"center",borderRight:"1px solid "+border}}>
                        <div style={{...s.playfair,fontSize:17,fontWeight:700,color:c}}>{v}</div>
                        <div style={{...s.mono,fontSize:9,color:"#7a8aaa",marginTop:2,letterSpacing:1,textTransform:"uppercase"}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{...s.mono,fontSize:10,color:"#7a8aaa",marginBottom:4}}>Journey to 175 lbs — {pct}% complete</div>
                  <div style={{height:10,background:border,borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#3b82f6,"+gold+")",borderRadius:5,transition:"width .5s"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",...s.mono,fontSize:10,color:"#3a4a6a",marginTop:4}}><span>280</span><span style={{color:gold}}>175</span></div>
                </div>
              );
            })()}
            {wLog.length>1&&(()=>{
              const ents=wLog.slice(-12);const wts=ents.map(e=>e.weight);
              const minW=Math.min(...wts)-2,maxW=Math.max(...wts)+2,range=maxW-minW;
              const pts=ents.map((e,i)=>[(ents.length===1?50:(i/(ents.length-1))*100).toFixed(1),(60-((e.weight-minW)/range)*60).toFixed(1)].join(",")).join(" ");
              return(
                <div style={{...s.card,marginBottom:12}}>
                  <div style={{...s.label,marginBottom:10}}>Trend</div>
                  <svg viewBox="0 0 100 60" style={{width:"100%",height:100,display:"block"}} preserveAspectRatio="none">
                    <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#3b82f6"/><stop offset="100%" stopColor={gold}/></linearGradient></defs>
                    <polyline points={pts} fill="none" stroke="url(#lg)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                    {ents.map((e,i)=>{const x=ents.length===1?50:(i/(ents.length-1))*100;const y=60-((e.weight-minW)/range)*60;return<circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r="2" fill={gold}/>;} )}
                  </svg>
                  <div style={{display:"flex",justifyContent:"space-between",...s.mono,fontSize:10,color:"#3a4a6a",marginTop:2}}><span>{ents[0].date.slice(5)}</span><span>{ents[ents.length-1].date.slice(5)}</span></div>
                </div>
              );
            })()}
            <div style={s.card}>
              <div style={{...s.label,marginBottom:10}}>All Entries</div>
              {wLog.length===0
                ?<div style={{color:"#3a4a6a",...s.mono,fontSize:12,textAlign:"center",padding:"16px 0"}}>No entries yet</div>
                :[...wLog].reverse().map((entry,i)=>{
                  const prev=wLog[wLog.length-1-i-1];const diff=prev?(entry.weight-prev.weight):null;
                  return(
                    <div key={entry.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1e2a4033"}}>
                      <div>
                        <div style={{...s.mono,fontSize:12}}>{entry.date}</div>
                        {diff!==null&&<div style={{fontSize:11,color:diff<0?"#22c55e":"#ef4444",...s.mono,marginTop:2}}>{diff<0?"":"+  "}{diff.toFixed(1)} lbs</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{...s.playfair,fontSize:17,fontWeight:700}}>{entry.weight} lbs</div>
                        <button onClick={()=>{const nx=wLog.filter(e=>e.date!==entry.date);setWLog(nx);sSet("weightlog",nx);}} style={{background:"none",border:"none",color:"#3a4a6a",cursor:"pointer",fontSize:14,padding:"2px 6px",borderRadius:4}}>✕</button>
                      </div>
                    </div>
                  );
                })
              }
            </div>
          </div>
        )}

        {/* ══ COACH ══ */}
        {tab==="coach"&&(
          <div style={{paddingTop:14}}>
            <h2 style={{...s.playfair,fontSize:22,marginBottom:4}}>Your <span style={{color:gold}}>Coach</span></h2>
            <p style={{color:"#7a8aaa",fontSize:12,...s.mono,marginBottom:14}}>Reads your real stats · Responds instantly</p>
            {!apiKey&&(
              <div style={{...s.card,borderColor:"#ef444455",marginBottom:14}}>
                <div style={{color:"#ef4444",...s.mono,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>API Key Required</div>
                <p style={{fontSize:13,color:"#a0b0cc",lineHeight:1.6,marginBottom:10}}>Get your free API key at <strong style={{color:"#c8a96e"}}>console.anthropic.com</strong> → API Keys → Create Key. Paste it below — saved permanently on your phone.</p>
                <div style={{display:"flex",gap:8}}>
                  <input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="sk-ant-..." type="password" style={{flex:1,background:"#0d1422",border:"1px solid #2a3050",color:"#e8e0d0",padding:"10px 12px",borderRadius:8,...s.mono,fontSize:13,outline:"none"}}/>
                  <button onClick={saveApiKey} disabled={!apiKeyInput.trim()} style={{background:apiKeyInput.trim()?"#c8a96e":"#1e2a40",border:"none",color:apiKeyInput.trim()?"#0a0f1e":"#3a4a6a",padding:"10px 16px",borderRadius:8,...s.mono,fontSize:12,fontWeight:700,cursor:"pointer"}}>Save</button>
                </div>
              </div>
            )}
            {apiKey&&(
              <div style={{...s.card,borderColor:"#22c55e44",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px"}}>
                <div style={{...s.mono,fontSize:11,color:"#22c55e"}}>✓ API Key connected</div>
                <button onClick={()=>{localStorage.removeItem("api-key");setApiKey("");}} style={{background:"none",border:"none",color:"#3a4a6a",cursor:"pointer",...s.mono,fontSize:11}}>Remove</button>
              </div>
            )}
            {apiKeySaved&&<div style={{...s.mono,fontSize:12,color:"#22c55e",marginBottom:10,padding:"8px 12px",background:"#22c55e11",borderRadius:8}}>✓ API key saved — coach is ready!</div>}
            {coachMsgs.length===0&&(
              <div style={{marginBottom:14}}>
                <div style={{...s.mono,fontSize:10,color:"#7a8aaa",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Quick Questions</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {QUICK_Q.map(q=>(
                    <button key={q} onClick={()=>sendCoach(q)} style={{background:card,border:"1px solid #2a3050",color:"#a0b0cc",padding:"8px 12px",borderRadius:20,cursor:"pointer",...s.mono,fontSize:11,letterSpacing:1,textAlign:"left"}}>{q}</button>
                  ))}
                </div>
              </div>
            )}
            <div style={{background:dark,border:"1px solid "+border,borderRadius:12,padding:14,marginBottom:10,minHeight:280,maxHeight:440,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
              {coachMsgs.length===0&&(
                <div style={{textAlign:"center",padding:"36px 16px"}}>
                  <div style={{fontSize:32,marginBottom:10}}>💪</div>
                  <div style={{...s.playfair,fontSize:17,color:gold,marginBottom:6}}>Hey Greg, I am your Coach</div>
                  <div style={{fontSize:13,color:"#7a8aaa",lineHeight:1.6}}>I know your full plan, today's numbers, your deficit, and your goals. Ask me anything.</div>
                </div>
              )}
              {coachMsgs.map((m,i)=>(
                <div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{...s.mono,fontSize:10,color:m.role==="user"?"#7a8aaa":gold,marginBottom:3,letterSpacing:1}}>{m.role==="user"?"YOU":"COACH"}</div>
                  <div style={{padding:"10px 14px",fontSize:14,lineHeight:1.6,maxWidth:"90%",...(m.role==="user"?{background:"#1e3a5f",border:"1px solid #2a5080",borderRadius:"12px 12px 4px 12px",marginLeft:"auto"}:{background:card,border:"1px solid "+border,borderRadius:"12px 12px 12px 4px"})}}>{m.content}</div>
                </div>
              ))}
              {coachLoading&&(
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start"}}>
                  <div style={{...s.mono,fontSize:10,color:gold,marginBottom:3,letterSpacing:1}}>COACH</div>
                  <div style={{background:card,border:"1px solid "+border,borderRadius:"12px 12px 12px 4px",padding:"12px 16px"}}>
                    <div style={{display:"flex",gap:4}}>
                      {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:gold,animation:"pulse 1.2s ease-in-out "+(i*0.2)+"s infinite"}}/>)}
                    </div>
                  </div>
                </div>
              )}
              <div ref={chatEnd}/>
            </div>
            <style>{`@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}`}</style>
            <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
              <textarea value={coachInput} onChange={e=>setCoachInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendCoach();}}} placeholder="Ask your coach anything... (Enter to send)" rows={2} style={{flex:1,background:card,border:"1px solid #2a3050",color:"#e8e0d0",padding:"10px 12px",borderRadius:10,fontFamily:"Georgia,serif",fontSize:14,outline:"none",resize:"none"}}/>
              <button onClick={()=>sendCoach()} disabled={coachLoading||!coachInput.trim()} style={{background:coachLoading||!coachInput.trim()?"#1e2a40":gold,border:"none",color:coachLoading||!coachInput.trim()?"#3a4a6a":dark,padding:"12px 14px",borderRadius:10,...s.mono,fontSize:12,fontWeight:700,cursor:"pointer",height:50,whiteSpace:"nowrap"}}>{coachLoading?"...":"Send"}</button>
            </div>
            {coachMsgs.length>0&&<button onClick={()=>setCoachMsgs([])} style={{marginTop:8,background:"none",border:"none",color:"#3a4a6a",...s.mono,fontSize:11,cursor:"pointer",letterSpacing:1}}>Clear chat</button>}
          </div>
        )}

        {/* ══ BACKUP ══ */}
        {tab==="backup"&&(
          <div style={{paddingTop:14}}>
            <h2 style={{...s.playfair,fontSize:22,marginBottom:4}}>Backup <span style={{color:gold}}>& Restore</span></h2>
            <p style={{color:"#7a8aaa",fontSize:12,...s.mono,marginBottom:16}}>Since this is an HTML file, your data saves permanently in this browser's localStorage. Use this to back it up or move it to another device.</p>
            <div style={{...s.card,borderColor:"#22c55e44",marginBottom:12}}>
              <div style={{color:"#22c55e",...s.mono,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Export — Save Your Data</div>
              <p style={{fontSize:13,color:"#a0b0cc",lineHeight:1.6,marginBottom:12}}>Tap Export, then copy ALL the text. Paste it somewhere safe — your Notes app, email to yourself, or a Google Doc.</p>
              <button onClick={exportData} style={{background:"#22c55e",border:"none",color:dark,padding:"11px 20px",borderRadius:8,...s.mono,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1,width:"100%",marginBottom:10}}>Export My Data</button>
              {exportText&&(
                <div>
                  <div style={{fontSize:11,color:"#22c55e",...s.mono,marginBottom:6,letterSpacing:1}}>SELECT ALL AND COPY THIS:</div>
                  <textarea readOnly value={exportText} onClick={e=>e.target.select()} style={{width:"100%",background:"#0d1422",border:"1px solid #22c55e44",color:"#a0b0cc",padding:10,borderRadius:8,...s.mono,fontSize:11,height:110,resize:"none"}}/>
                  <div style={{fontSize:11,color:"#7a8aaa",...s.mono,marginTop:5}}>Tap the box to select all, then copy</div>
                </div>
              )}
            </div>
            <div style={{...s.card,borderColor:"#3b82f644"}}>
              <div style={{color:"#3b82f6",...s.mono,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Restore — Paste Your Backup</div>
              <p style={{fontSize:13,color:"#a0b0cc",lineHeight:1.6,marginBottom:12}}>Paste your previously exported backup below and tap Restore.</p>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Paste your backup data here..." rows={4} style={{width:"100%",background:"#0d1422",border:"1px solid #2a3050",color:"#e8e0d0",padding:10,borderRadius:8,...s.mono,fontSize:12,outline:"none",resize:"none",marginBottom:8}}/>
              <button onClick={importData} disabled={!importText.trim()} style={{background:importText.trim()?"#3b82f6":"#1e2a40",border:"none",color:importText.trim()?"#fff":"#3a4a6a",padding:"11px 20px",borderRadius:8,...s.mono,fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1,width:"100%"}}>Restore My Data</button>
              {importMsg&&<div style={{marginTop:10,fontSize:12,...s.mono,color:importMsg.includes("success")?"#22c55e":"#ef4444",padding:"8px 12px",background:"#0d1422",borderRadius:6,border:"1px solid "+border}}>{importMsg}</div>}
            </div>
            <div style={{...s.card,borderColor:"#c8a96e33",marginTop:12}}>
              <div style={{...s.label,marginBottom:10}}>How to Add to Phone Home Screen</div>
              <div style={{fontSize:13,color:"#a0b0cc",lineHeight:1.8}}>
                <strong style={{color:"#e8e0d0"}}>iPhone (Safari):</strong> Open this file in Safari → tap Share → "Add to Home Screen"<br/>
                <strong style={{color:"#e8e0d0"}}>Android (Chrome):</strong> Open in Chrome → tap Menu → "Add to Home Screen"<br/>
                <strong style={{color:"#e8e0d0"}}>It will look and feel like a native app</strong> — full screen, no browser bars.
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
